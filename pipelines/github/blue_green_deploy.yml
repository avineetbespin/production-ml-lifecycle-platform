name: MLOps Blue/Green Deployment

on:
  push:
    branches:
      - main

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Quality Gate
        run: |
          CANDIDATE_RUN_ID=$(python src/training/train.py --model-name "production-model" --artifact-path "model" | tail -n1)
          echo "RUN_ID=$CANDIDATE_RUN_ID" >> $GITHUB_ENV
          python src/governance/quality_gate.py --run-id "$CANDIDATE_RUN_ID" --artifact-path "model"
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          REFERENCE_DATA_PATH: ${{ secrets.REFERENCE_DATA_PATH }}

  deploy_blue_green:
    needs: quality_gate
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install CLI tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Deploy green environment (GCP)
        if: env.CLOUD_PROVIDER == 'gcp'
        run: |
          echo "Deploying blue/green service to Cloud Run"
          gcloud run deploy ${SERVICE_NAME}-green \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/app-image:latest \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated
      - name: Deploy green environment (AWS)
        if: env.CLOUD_PROVIDER == 'aws'
        run: |
          echo "Deploying blue/green service to AWS App Runner"
          aws apprunner create-service --service-name ${SERVICE_NAME}-green --source-configuration file://app-runner-config.json
      - name: Smoke test green deployment
        run: |
          curl --fail https://${SERVICE_NAME}-green.example.com/health
      - name: Switch traffic to green
        run: |
          echo "Switching traffic to green environment for zero downtime"
